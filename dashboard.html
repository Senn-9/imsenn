<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beneficiary Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-0 sticky top-0 z-10 shadow-sm">
        <h1 class="text-lg sm:text-xl font-extrabold text-slate-900 tracking-tight">Beneficiary <span class="text-blue-600">Dashboard</span></h1>
        <a href="index.html" class="bg-blue-600 text-white px-3 sm:px-4 py-2 rounded-lg font-bold text-xs sm:text-sm hover:bg-blue-700 transition-all shadow-md whitespace-nowrap">
            + Data Entry
        </a>
    </nav>

    <main class="p-3 sm:p-4 md:p-8 max-w-7xl mx-auto">
        <div class="mb-6 grid grid-cols-1 md:grid-cols-4 gap-3 sm:gap-4">
            <div class="md:col-span-2 relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                <input type="text" id="searchInput" placeholder="Search name or location..." 
                    class="w-full pl-10 pr-4 py-2 sm:py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none shadow-sm transition-all text-sm sm:text-base">
            </div>
            
            <select id="filterCategory" class="px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-slate-200 bg-white font-semibold text-slate-600 outline-none shadow-sm cursor-pointer hover:border-blue-300 text-sm sm:text-base">
                <option value="All">All Categories</option>
                <option value="Food">🍲 Food</option>
                <option value="Non Food">📦 Non-Food</option>
            </select>

            <select id="viewMonth" class="px-3 sm:px-4 py-2 sm:py-3 rounded-xl border-2 border-blue-500 bg-white font-bold text-blue-600 outline-none shadow-sm cursor-pointer hover:bg-blue-50 text-sm sm:text-base">
                <option value="march">March Sales</option>
                <option value="april">April Sales</option>
                <option value="may">May Sales</option>
                <option value="june">June Sales</option>
            </select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-full">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Beneficiary Name</th>
                            <th class="hidden sm:table-cell px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Location</th>
                            <th class="hidden lg:table-cell px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest text-center">Years Solved</th>
                            <th class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Category</th>
                            <th class="hidden md:table-cell px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Specific Goods</th>
                            <th class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest text-right">Total Sales</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            <div id="loadingState" class="p-6 sm:p-8 md:p-12 text-center text-slate-400 font-bold uppercase tracking-widest text-xs">
                Fetching records from database...
            </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
