<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mint': '#E9FFF9',
                        'dark-bg': '#080B08',
                        'card-bg': '#121A12',
                        'accent': '#00FF94',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B1622; }
        ::-webkit-scrollbar-thumb { background: #00FF94; border-radius: 10px; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #121A12 25%, #1a2a1a 50%, #121A12 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 6px;
        }
        .skeleton-card {
            background: linear-gradient(90deg, #121A12 25%, #1a2a1a 50%, #121A12 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }
    </style>
</head>
<body class="bg-dark-bg text-mint font-sans antialiased">

    <!-- NAV -->
    <nav class="px-4 sm:px-6 py-4 bg-card-bg/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-3 sm:gap-6 max-w-screen-2xl mx-auto">
            <a href="index.html" class="block group shrink-0">
                <h1 class="text-lg sm:text-2xl font-black tracking-tighter text-accent uppercase group-hover:opacity-80 transition-opacity">
                    AnimeTracker
                </h1>
            </a>
            <div class="flex-1 relative">
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search anime..."
                    class="w-full bg-dark-bg border border-white/10 rounded-md px-3 sm:px-4 py-2 text-sm text-mint placeholder-mint/30 focus:outline-none focus:border-accent transition-colors duration-200"
                    autocomplete="off"
                />
                <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 text-mint/30 hover:text-accent hidden text-lg leading-none">✕</button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-10 py-8 sm:py-10">

        <!-- LIST VIEW -->
        <div id="list-view">
            <div class="flex items-center gap-3 sm:gap-4 mb-8 sm:mb-10">
                <span class="w-1 sm:w-1.5 h-8 sm:h-10 bg-accent shrink-0"></span>
                <h1 id="list-title" class="text-2xl sm:text-4xl font-black text-white uppercase tracking-tighter italic truncate">Loading...</h1>
            </div>

            <!-- Skeleton grid shown before data loads -->
            <div id="list-skeleton" class="grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 sm:gap-6 lg:gap-8 mb-12 sm:mb-16">
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-2/3 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div class="hidden md:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-1/2 mx-auto mt-3 rounded"></div></div>
                <div class="hidden lg:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div class="hidden lg:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-2/3 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-2/3 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-1/2 mx-auto mt-3 rounded"></div></div>
                <div class="hidden md:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div class="hidden lg:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-2/3 mx-auto mt-3 rounded"></div></div>
                <div class="hidden lg:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
            </div>

            <div id="list-content" class="grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 sm:gap-6 lg:gap-8 mb-12 sm:mb-16 hidden"></div>

            <!-- Pagination -->
            <div class="flex justify-center items-center gap-4 sm:gap-8 pb-16 sm:pb-20">
                <button id="prev-btn" class="px-4 sm:px-6 py-2.5 sm:py-3 bg-card-bg rounded-md font-bold text-xs sm:text-sm hover:bg-accent hover:text-dark-bg disabled:opacity-20 disabled:pointer-events-none transition-all">
                    ← Prev
                </button>
                <span id="page-num" class="font-black text-lg sm:text-xl text-accent">1</span>
                <button id="next-btn" class="px-4 sm:px-6 py-2.5 sm:py-3 bg-card-bg rounded-md font-bold text-xs sm:text-sm hover:bg-accent hover:text-dark-bg disabled:opacity-20 transition-all">
                    Next →
                </button>
            </div>
        </div>

        <!-- SEARCH VIEW -->
        <div id="search-view" class="hidden">
            <div class="flex items-center gap-3 mb-8">
                <span class="w-1 h-6 bg-accent shrink-0"></span>
                <h2 class="text-lg sm:text-xl font-bold text-mint uppercase tracking-widest">Search Results</h2>
                <span id="search-count" class="text-xs text-accent/60 font-bold ml-2"></span>
            </div>
            <div id="search-grid" class="grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 sm:gap-6 lg:gap-8"></div>
            <div id="search-skeleton" class="hidden grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 sm:gap-6 lg:gap-8">
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-2/3 mx-auto mt-3 rounded"></div></div>
                <div><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
                <div class="hidden md:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-2/3 mx-auto mt-3 rounded"></div></div>
                <div class="hidden lg:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-1/2 mx-auto mt-3 rounded"></div></div>
                <div class="hidden lg:block"><div class="skeleton-card rounded-md aspect-[2/3]"></div><div class="skeleton h-3 w-3/4 mx-auto mt-3 rounded"></div></div>
            </div>
            <div id="search-empty" class="hidden flex flex-col items-center justify-center h-48 text-mint/30">
                <p class="text-4xl mb-3">🔍</p>
                <p class="text-sm uppercase tracking-widest">No results found</p>
            </div>
        </div>

    </div>

    <script>
        const GRAPHQL_URL = 'https://graphql.anilist.co';
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'Trending Now';
        const sort = params.get('sort') || 'TRENDING_DESC';
        let currentPage = parseInt(params.get('page')) || 1;

        document.getElementById('list-title').innerText = type;

        function animeCardHTML(anime) {
            return `
                <a href="details.html?id=${anime.id}" class="group block">
                    <div class="relative overflow-hidden rounded-md shadow-2xl bg-card-bg aspect-[2/3]">
                        <img src="${anime.coverImage.extraLarge}" loading="lazy"
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 group-hover:opacity-30">
                        <div class="absolute inset-0 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <span class="text-accent font-black text-xl sm:text-2xl">${anime.averageScore || '??'}%</span>
                            <span class="text-[9px] sm:text-[10px] uppercase tracking-widest text-white/60">${anime.format || 'TV'}</span>
                        </div>
                    </div>
                    <p class="mt-2 sm:mt-4 font-bold text-xs sm:text-sm text-center group-hover:text-accent transition-colors duration-300 line-clamp-2 px-1 sm:px-2">
                        ${anime.title.english || anime.title.romaji}
                    </p>
                </a>`;
        }

        function getQueryForType(typeParam) {
            if (typeParam === 'Popular This Season') {
                return `query ($page: Int, $sort: [MediaSort]) {
                    Page(page: $page, perPage: 12) {
                        pageInfo { hasNextPage }
                        media(sort: $sort, type: ANIME, season: SPRING, seasonYear: 2026) {
                            id title { english romaji } coverImage { extraLarge } averageScore format
                        }
                    }
                }`;
            } else if (typeParam === 'Upcoming Next Season') {
                return `query ($page: Int, $sort: [MediaSort]) {
                    Page(page: $page, perPage: 12) {
                        pageInfo { hasNextPage }
                        media(sort: $sort, type: ANIME, status: NOT_YET_RELEASED) {
                            id title { english romaji } coverImage { extraLarge } averageScore format
                        }
                    }
                }`;
            } else {
                return `query ($page: Int, $sort: [MediaSort]) {
                    Page(page: $page, perPage: 12) {
                        pageInfo { hasNextPage }
                        media(sort: $sort, type: ANIME) {
                            id title { english romaji } coverImage { extraLarge } averageScore format
                        }
                    }
                }`;
            }
        }

        async function fetchListPage() {
            const skeleton = document.getElementById('list-skeleton');
            const content = document.getElementById('list-content');

            skeleton.classList.remove('hidden');
            content.classList.add('hidden');

            const query = getQueryForType(type);

            try {
                const response = await fetch(GRAPHQL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { page: currentPage, sort: [sort] } })
                });
                const result = await response.json();
                const data = result.data.Page;

                document.getElementById('page-num').innerText = currentPage;
                document.getElementById('prev-btn').disabled = (currentPage === 1);
                document.getElementById('next-btn').disabled = !data.pageInfo.hasNextPage;

                content.innerHTML = data.media.map(animeCardHTML).join('');
                skeleton.classList.add('hidden');
                content.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                skeleton.classList.add('hidden');
                content.classList.remove('hidden');
                content.innerHTML = `<p class="col-span-full text-center text-mint/40">Failed to load content.</p>`;
            }
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; updateUrlAndFetch(); }
        });
        document.getElementById('next-btn').addEventListener('click', () => {
            currentPage++; updateUrlAndFetch();
        });

        function updateUrlAndFetch() {
            const newUrl = `${window.location.pathname}?type=${encodeURIComponent(type)}&sort=${sort}&page=${currentPage}`;
            window.history.pushState({}, '', newUrl);
            fetchListPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Search ---
        const searchQuery = `
        query ($search: String) {
          Page(page: 1, perPage: 24) {
            pageInfo { total }
            media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
              id title { english romaji } coverImage { extraLarge } format averageScore
            }
          }
        }`;

        let searchTimeout = null;

        async function performSearch(term) {
            const searchGrid = document.getElementById('search-grid');
            const searchSkeleton = document.getElementById('search-skeleton');
            const searchEmpty = document.getElementById('search-empty');
            const searchCount = document.getElementById('search-count');

            searchGrid.innerHTML = '';
            searchEmpty.classList.add('hidden');
            searchSkeleton.classList.remove('hidden');

            try {
                const response = await fetch(GRAPHQL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: searchQuery, variables: { search: term } })
                });
                const result = await response.json();
                const items = result.data.Page.media;
                const total = result.data.Page.pageInfo.total;

                searchSkeleton.classList.add('hidden');

                if (items.length === 0) {
                    searchEmpty.classList.remove('hidden');
                    searchCount.textContent = '';
                } else {
                    searchCount.textContent = `${total} result${total !== 1 ? 's' : ''}`;
                    searchGrid.innerHTML = items.map(animeCardHTML).join('');
                }
            } catch (err) {
                searchSkeleton.classList.add('hidden');
                searchEmpty.classList.remove('hidden');
            }
        }

        function showSearch(term) {
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('search-view').classList.remove('hidden');
            document.getElementById('search-clear').classList.remove('hidden');
            performSearch(term);
        }

        function showList() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('search-clear').classList.add('hidden');
            document.getElementById('search-input').value = '';
        }

        document.getElementById('search-input').addEventListener('input', function () {
            const term = this.value.trim();
            clearTimeout(searchTimeout);
            if (term.length === 0) { showList(); return; }
            if (term.length < 2) return;
            searchTimeout = setTimeout(() => showSearch(term), 400);
        });

        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Escape') showList();
        });

        document.getElementById('search-clear').addEventListener('click', showList);

        fetchListPage();
    </script>
</body>
</html>
