<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AniPub Advanced</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER -->
<div class="sticky top-0 z-50 p-4 bg-gradient-to-b from-gray-800 to-gray-900 border-b border-gray-700 space-y-2 shadow-lg">
  <div class="flex gap-2">
    <div class="flex-1 relative">
      <input id="searchInput"
        class="w-full p-3 rounded bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 transition"
        placeholder="Search anime..."
        onkeypress="handleEnter(event)"
        oninput="liveSearch(this.value)"
        autocomplete="off" />
      <div id="dropdown" class="hidden absolute top-full left-0 right-0 bg-gray-700 rounded-b shadow-lg max-h-48 overflow-y-auto mt-1 z-10"></div>
    </div>

    <button onclick="searchButton()"
      class="px-6 py-3 bg-blue-600 rounded hover:bg-blue-700 font-semibold transition">
      Search
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="p-4 grid md:grid-cols-3 gap-6">

  <!-- INFO SIDEBAR -->
  <div class="space-y-4">
    <div class="relative">
      <img id="cover" class="w-full rounded-lg shadow-lg bg-gray-800" alt="Anime cover"/>
      <div id="loadingCover" class="absolute inset-0 bg-gray-800 rounded-lg animate-pulse hidden"></div>
    </div>
    <div>
      <h1 id="title" class="text-2xl font-bold line-clamp-2">Select an anime</h1>
      <p id="desc" class="text-sm text-gray-400 mt-2 line-clamp-6"></p>
    </div>
  </div>

  <!-- PLAYER + EPISODES -->
  <div class="md:col-span-2 space-y-4">

    <!-- VIDEO PLAYER (IFRAME) -->
    <div class="bg-black rounded-lg overflow-hidden shadow-lg">
      <iframe 
        id="player" 
        class="w-full aspect-video bg-black"
        allowfullscreen
        frameborder="0"
        allow="autoplay; encrypted-media">
      </iframe>
    </div>

    <!-- ERROR MESSAGE -->
    <div id="errorMsg" class="hidden bg-red-900 border border-red-700 text-red-100 p-3 rounded text-sm"></div>

    <!-- EPISODES GRID -->
    <div>
      <h3 class="text-sm font-semibold mb-3 text-gray-300">Episodes</h3>
      <div id="episodes" class="grid grid-cols-3 md:grid-cols-8 gap-2 max-h-[400px] overflow-y-auto no-scrollbar">
        <p class="col-span-full text-gray-400 text-xs">No episodes loaded</p>
      </div>
    </div>

  </div>
</div>

<style>
  .episode-btn.active { @apply bg-blue-600 text-white; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .dropdown-item { @apply block w-full text-left px-4 py-2 hover:bg-gray-600 cursor-pointer transition; }
</style>

<script>
let currentAnimeId = null;
let currentEpisodeLinks = [];

// CORS proxy to bypass CORS restrictions
const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';
const API_BASE = 'https://anipub.xyz';

// UTILITIES
function showError(msg) {
  const errorDiv = document.getElementById("errorMsg");
  errorDiv.innerText = msg;
  errorDiv.classList.remove("hidden");
  setTimeout(() => errorDiv.classList.add("hidden"), 6000);
}

function hideError() {
  document.getElementById("errorMsg").classList.add("hidden");
}

// LIVE SEARCH DROPDOWN
async function liveSearch(query) {
  const dropdown = document.getElementById("dropdown");
  
  if (!query || query.length < 2) {
    dropdown.classList.add("hidden");
    return;
  }

  try {
    const res = await fetch(
      `https://anipub.xyz/api/search/${encodeURIComponent(query)}`,
      { 
        method: 'GET',
        headers: { 
          'Accept': 'application/json',
          'X-Requested-With': 'XMLHttpRequest'
        }
      }
    );

    if (!res.ok) {
      console.warn("Search status:", res.status);
      dropdown.innerHTML = '<div class="px-4 py-2 text-gray-400 text-sm text-xs">Tip: Disable live search and use the Search button instead</div>';
      dropdown.classList.remove("hidden");
      return;
    }
    
    const results = await res.json();

    if (!results || results.length === 0) {
      dropdown.innerHTML = '<div class="px-4 py-2 text-gray-400 text-sm">No results found</div>';
      dropdown.classList.remove("hidden");
      return;
    }

    dropdown.innerHTML = results.slice(0, 10).map(anime => `
      <button onclick="selectAnime(${anime.Id}, '${(anime.Name || '').replace(/'/g, "\\'")}'" class="dropdown-item">
        <span class="font-medium">${anime.Name || 'Unknown'}</span>
      </button>
    `).join('');
    
    dropdown.classList.remove("hidden");
  } catch (err) {
    console.warn("Live search not available (CORS)");
    // Silently fail - user can use search button instead
  }
}

// SELECT FROM DROPDOWN
function selectAnime(id, name) {
  document.getElementById("searchInput").value = name;
  document.getElementById("dropdown").classList.add("hidden");
  loadAnime(id);
}

// ENTER KEY SUPPORT
function handleEnter(e) {
  if (e.key === "Enter") {
    searchButton();
  }
}

// 🔍 SEARCH BUTTON
async function searchButton() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  hideError();
  document.getElementById("dropdown").classList.add("hidden");
  
  const btn = document.querySelector('button[onclick="searchButton()"]');
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = "Loading...";

  try {
    // Try with no-cors mode first
    const res = await fetch(
      `https://anipub.xyz/api/search/${encodeURIComponent(query)}`,
      { 
        method: 'GET',
        mode: 'no-cors'
      }
    );

    // no-cors returns opaque response, so we need to try standard fetch
    const standardRes = await fetch(
      `https://anipub.xyz/api/search/${encodeURIComponent(query)}`
    );

    if (!standardRes.ok) {
      throw new Error(`API returned ${standardRes.status}`);
    }
    
    const results = await standardRes.json();

    if (!results || results.length === 0) {
      showError(`No anime found for "${query}"`);
      btn.disabled = false;
      btn.innerText = originalText;
      return;
    }

    // Load the first result
    await loadAnime(results[0].Id);
    btn.disabled = false;
    btn.innerText = originalText;
  } catch (err) {
    btn.disabled = false;
    btn.innerText = originalText;
    console.error("Search error:", err);
    showError(`Search failed due to API restrictions. Try opening the page in a different way or use a VPN.`);
  }
}

// 📦 LOAD ANIME INFO
async function loadAnime(id) {
  hideError();
  currentAnimeId = id;
  document.getElementById("loadingCover").classList.remove("hidden");

  try {
    // Fetch anime info
    const infoRes = await fetch(`https://anipub.xyz/api/info/${id}`);
    const infoData = await infoRes.json();

    // Fetch streaming links from v1 API
    const detailsRes = await fetch(`https://anipub.xyz/v1/api/details/${id}`);
    const detailsData = await detailsRes.json();

    const fixUrl = (p) => {
      if (!p) return null;
      return p.startsWith("http") ? p : `https://anipub.xyz/${p}`;
    };

    // Set anime info
    document.getElementById("cover").src =
      fixUrl(infoData.Cover) || fixUrl(infoData.ImagePath) || '';
    document.getElementById("cover").onerror = function() {
      this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22%3E%3Crect fill=%22%23374151%22 width=%22100%25%22 height=%22100%25%22/%3E%3C/svg%3E';
    };

    document.getElementById("title").innerText =
      infoData.title || infoData.name || "No Title";

    document.getElementById("desc").innerText =
      infoData.description || infoData.synopsis || "No description available";

    document.getElementById("loadingCover").classList.add("hidden");

    // Parse episode links from v1 API response
    const local = detailsData.local;
    if (!local || !local.link) {
      showError("No streaming links found for this anime");
      return;
    }

    // Build episode array: EP1 = local.link, EP2+ = local.ep[]
    currentEpisodeLinks = [
      { ep: 1, link: cleanLink(local.link) }
    ];

    if (local.ep && Array.isArray(local.ep)) {
      local.ep.forEach((e, i) => {
        if (e.link) {
          currentEpisodeLinks.push({
            ep: i + 2,
            link: cleanLink(e.link)
          });
        }
      });
    }

    // Display episode buttons
    const container = document.getElementById("episodes");
    container.innerHTML = "";

    if (currentEpisodeLinks.length === 0) {
      container.innerHTML = '<p class="col-span-full text-gray-400 text-sm">No episodes available</p>';
      return;
    }

    currentEpisodeLinks.forEach(episode => {
      const btn = document.createElement("button");
      btn.className = "episode-btn bg-gray-700 hover:bg-gray-600 p-2 rounded text-xs font-medium transition";
      btn.innerText = episode.ep;
      btn.title = `Episode ${episode.ep}`;
      btn.dataset.ep = episode.ep;

      btn.onclick = () => playEpisode(episode.ep, btn);

      container.appendChild(btn);
    });

    // Auto-play first episode
    const firstBtn = container.querySelector('[data-ep="1"]');
    playEpisode(1, firstBtn);

  } catch (err) {
    document.getElementById("loadingCover").classList.add("hidden");
    console.error("Load anime error:", err);
    showError(`Error loading anime: ${err.message}`);
  }
}

// Clean link by removing 'src=' prefix
function cleanLink(link) {
  if (!link) return '';
  return link.replace(/^src=/, '');
}

// 🎬 PLAY EPISODE
function playEpisode(epNumber, btn) {
  hideError();

  const episode = currentEpisodeLinks.find(e => e.ep === epNumber);
  if (!episode || !episode.link) {
    showError(`Episode ${epNumber} not available`);
    return;
  }

  // Highlight active episode
  document.querySelectorAll(".episode-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");

  // Load iframe
  const player = document.getElementById("player");
  player.src = episode.link;
}
</script>

</body>
</html>
